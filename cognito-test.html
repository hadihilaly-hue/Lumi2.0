<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Lumi — Cognito auth test</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; background: #faf6ef; color: #1b2a4a; }
  h1 { font-size: 20px; }
  button { margin: 4px 6px 4px 0; padding: 8px 14px; border: 1px solid #1b2a4a; border-radius: 6px; background: #fff; cursor: pointer; font-size: 14px; }
  button:hover { background: #1b2a4a; color: #fff; }
  pre { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 12px; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
  .warn { color: #b45309; font-size: 13px; }
</style>
</head>
<body>
<h1>Cognito auth test page (Workstream I Phase 3)</h1>
<p class="warn">Standalone verification harness — not linked from the app. Safe to delete after cutover.</p>
<div>
  <button onclick="signIn()">Sign in</button>
  <button onclick="showSession()">getSession()</button>
  <button onclick="forceRefresh()">Force refresh</button>
  <button onclick="fetchData()">Fetch /profiles + /conversations</button>
  <button onclick="doSignOut()">Sign out</button>
</div>
<pre id="out">ready</pre>

<script src="cognito-auth.js"></script>
<script>
const LAMBDA_URL = 'https://44d5lnv7ir7q4xgapsukc4tlnq0jtjxz.lambda-url.us-east-1.on.aws';
const out = document.getElementById('out');
const log = (label, obj) => { out.textContent = label + '\n' + JSON.stringify(obj, null, 2); };

function redactSession(session) {
  if (!session) return null;
  return {
    ...session,
    access_token: session.access_token.slice(0, 24) + '…(' + session.access_token.length + ' chars)',
  };
}

async function signIn() {
  const base = window.location.href.replace(/\/[^/]*$/, '/');
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: base + 'cognito-test.html' },
  });
}

async function showSession() {
  const { data: { session } } = await sb.auth.getSession();
  log('session:', redactSession(session));
}

async function forceRefresh() {
  // Expire the stored token so the next getSession() must hit the refresh grant.
  const raw = localStorage.getItem('lumi_auth');
  if (!raw) { log('no stored tokens', null); return; }
  const t = JSON.parse(raw);
  t.expires_at = 0;
  localStorage.setItem('lumi_auth', JSON.stringify(t));
  const { data: { session } } = await sb.auth.getSession();
  log('session after forced refresh:', redactSession(session));
}

async function fetchData() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { log('not signed in', null); return; }
  const headers = { Authorization: `Bearer ${session.access_token}` };
  const [pRes, cRes] = await Promise.all([
    fetch(`${LAMBDA_URL}/profiles`, { headers }),
    fetch(`${LAMBDA_URL}/conversations`, { headers }),
  ]);
  const profile = pRes.ok ? await pRes.json() : { error: pRes.status };
  const convs = cRes.ok ? await cRes.json() : { error: cRes.status };
  log('data:', {
    profiles_status: pRes.status,
    profile_id: profile.id ?? null,
    profile_name: profile.name ?? null,
    conversations_status: cRes.status,
    conversations_count: Array.isArray(convs) ? convs.length : convs,
  });
}

// Show sign-in state on load (after any code exchange completes).
sb.auth.onAuthStateChange((event) => { out.textContent = 'auth event: ' + event; });
showSession();
</script>
</body>
</html>
