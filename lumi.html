<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi — Menlo School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── THEME ───────────────────────────────────────────── */
:root {
  --bg:          #0b0b12;
  --surface:     #111120;
  --surface-2:   #16162a;
  --sb-bg:       #0d0d1a;
  --border:      #21213a;
  --text:        #e2e2ef;
  --text-muted:  #686882;
  --text-faint:  #35354f;
  --accent:      #7b69f5;
  --accent-soft: rgba(123,105,245,.13);
  --accent-glow: rgba(123,105,245,.28);
  --user-bg:     linear-gradient(135deg,#6b5ce7,#8a7af6);
  --lumi-bg:     #14142a;
  --radius:      16px;
  --radius-sm:   10px;
  --shadow:      0 4px 24px rgba(0,0,0,.45);
}
html.light {
  --bg:          #f5f5f7;
  --surface:     #ffffff;
  --surface-2:   #ececf1;
  --sb-bg:       #ebebf0;
  --border:      #dcdce8;
  --text:        #1a1a2e;
  --text-muted:  #72728a;
  --text-faint:  #b8b8cc;
  --accent:      #6b59e5;
  --accent-soft: rgba(107,89,229,.1);
  --accent-glow: rgba(107,89,229,.2);
  --user-bg:     linear-gradient(135deg,#6b59e5,#8a7af6);
  --lumi-bg:     #f0f0fa;
  --shadow:      0 4px 24px rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
body{display:flex;height:100vh}

/* ─── SIDEBAR ─────────────────────────────────────────── */
.sidebar{
  width:264px;flex-shrink:0;background:var(--sb-bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:50;
}
.sb-scroll{
  flex:1;overflow-y:auto;padding:12px 8px 8px;
  display:flex;flex-direction:column;
}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* logo */
.sb-logo{display:flex;align-items:center;gap:9px;padding:2px 6px 14px;}
.logo-mark{
  width:28px;height:28px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
  box-shadow:0 0 14px var(--accent-glow);
  animation:lumiBreathe 3s ease-in-out infinite;
}
@keyframes lumiBreathe{0%,100%{box-shadow:0 0 10px var(--accent-glow)}50%{box-shadow:0 0 22px var(--accent-glow)}}
.sb-logo-name{font-size:15px;font-weight:600;letter-spacing:-.3px}
.sb-logo-school{font-size:10px;color:var(--text-muted);font-weight:400;margin-top:1px}

/* new chat */
.sb-new{
  display:flex;align-items:center;gap:7px;width:100%;
  padding:8px 12px;margin-bottom:10px;
  background:var(--accent-soft);border:1px solid rgba(123,105,245,.22);
  border-radius:var(--radius-sm);color:var(--accent);
  font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .2s;
}
.sb-new:hover{background:rgba(123,105,245,.2);border-color:var(--accent)}
.sb-new svg{width:13px;height:13px;stroke:currentColor;fill:none;flex-shrink:0}

/* search */
.sb-search-wrap{position:relative;margin-bottom:10px;}
.sb-search{
  width:100%;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:inherit;
  font-size:12px;padding:7px 10px 7px 30px;outline:none;transition:border-color .2s;
}
.sb-search:focus{border-color:var(--accent)}
.sb-search::placeholder{color:var(--text-faint)}
.sb-search-ico{
  position:absolute;left:9px;top:50%;transform:translateY(-50%);
  color:var(--text-faint);pointer-events:none;
}
.sb-search-ico svg{width:12px;height:12px;stroke:currentColor;fill:none}

/* ── Conversation history ── */
.hist-item{
  position:relative;display:flex;align-items:center;gap:4px;
  padding:7px 6px 7px 8px;border-radius:8px;cursor:pointer;
  font-size:12.5px;color:var(--text-muted);transition:background .13s,color .13s;
  min-height:34px;
}
.hist-item:hover{color:var(--text);background:var(--surface-2)}
.hist-item.active{color:var(--accent);background:var(--accent-soft)}
.hist-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.hist-title.renaming{display:none}
.hist-rename-input{
  flex:1;background:var(--surface-2);border:1px solid var(--accent);
  border-radius:5px;color:var(--text);font-family:inherit;
  font-size:12.5px;padding:2px 7px;outline:none;min-width:0;
}
.hist-menu-btn{
  width:22px;height:22px;flex-shrink:0;background:none;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-faint);border-radius:5px;
  opacity:0;transition:opacity .13s,background .13s;
  font-size:13px;letter-spacing:1px;line-height:1;font-weight:700;
}
.hist-item:hover .hist-menu-btn,
.hist-menu-btn.open{opacity:1}
.hist-menu-btn:hover,.hist-menu-btn.open{background:var(--border);color:var(--text-muted)}
.hist-dropdown{
  position:fixed;z-index:500;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:4px;
  box-shadow:0 8px 28px rgba(0,0,0,.35);
  min-width:120px;
}
html.light .hist-dropdown{box-shadow:0 8px 28px rgba(0,0,0,.15)}
.hist-dd-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:6px;cursor:pointer;
  font-size:12.5px;color:var(--text-muted);
  transition:background .13s,color .13s;white-space:nowrap;
}
.hist-dd-item:hover{background:var(--surface-2);color:var(--text)}
.hist-dd-item.danger:hover{background:rgba(255,80,80,.09);color:#ff7070}
.sb-empty{font-size:11.5px;color:var(--text-faint);font-style:italic;padding:4px 8px 8px;}

/* divider + section label */
.sb-divider{height:1px;background:var(--border);margin:8px 0;}
.sb-section-label{
  font-size:9.5px;font-weight:600;color:var(--text-faint);
  text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin:8px 0 4px;
}

/* ── Subject rows ── */
.sb-subject{}
.sb-subj-hd{
  display:flex;align-items:center;gap:6px;
  padding:7px 8px;border-radius:8px;cursor:pointer;
  font-size:12.5px;font-weight:500;color:var(--text-muted);transition:all .15s;
}
.sb-subj-hd:hover{color:var(--text);background:var(--surface-2)}
.sb-subject.open .sb-subj-hd{color:var(--text)}
.sb-subj-arrow{
  width:13px;height:13px;flex-shrink:0;margin-left:auto;
  fill:none;stroke:currentColor;stroke-width:2;
  transition:transform .22s ease;
}
.sb-subject.open .sb-subj-arrow{transform:rotate(90deg)}

/* ── Courses ── */
.sb-courses{overflow:hidden;max-height:0;transition:max-height .3s ease;}
.sb-subject.open .sb-courses{max-height:2000px}
.sb-course{}
.sb-course-hd{
  display:flex;align-items:center;gap:5px;
  padding:5px 8px 5px 22px;border-radius:7px;cursor:pointer;
  font-size:12px;color:var(--text-muted);transition:all .15s;
}
.sb-course-hd:hover{color:var(--text);background:var(--surface-2)}
.sb-course.open .sb-course-hd{color:var(--text)}
.sb-course-arrow{
  width:11px;height:11px;flex-shrink:0;margin-left:auto;
  fill:none;stroke:currentColor;stroke-width:2;
  transition:transform .18s ease;
}
.sb-course.open .sb-course-arrow{transform:rotate(90deg)}

/* ── Teachers ── */
.sb-teachers{overflow:hidden;max-height:0;transition:max-height .22s ease;}
.sb-course.open .sb-teachers{max-height:300px}
.sb-teacher{
  display:flex;align-items:center;gap:7px;
  padding:5px 8px 5px 36px;
  border-radius:6px;cursor:pointer;width:100%;
  background:none;border:none;font-family:inherit;
  text-align:left;font-size:11.5px;color:var(--text-faint);transition:all .15s;
}
.sb-teacher:hover{color:var(--text-muted);background:var(--surface-2)}
.sb-teacher.active{color:var(--accent)!important;background:var(--accent-soft)}
.sb-teacher-dot{
  width:5px;height:5px;border-radius:50%;background:currentColor;
  flex-shrink:0;opacity:.6;
}

/* sidebar bottom */
.sb-bottom{padding:8px;border-top:1px solid var(--border);flex-shrink:0;}
.sb-settings-btn{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:8px 12px;background:none;border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-muted);
  font-family:inherit;font-size:12.5px;cursor:pointer;transition:all .2s;
}
.sb-settings-btn:hover{border-color:var(--accent);color:var(--accent)}
.sb-settings-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}

/* mobile overlay */
.sb-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:49;opacity:0;pointer-events:none;transition:opacity .25s;
}
.sb-overlay.open{opacity:1;pointer-events:all}

/* ─── CONTENT ─────────────────────────────────────────── */
.content{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden;}

/* mobile header */
.mob-header{
  display:none;align-items:center;justify-content:space-between;
  height:48px;padding:0 16px;
  background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;
}
.hamburger{
  width:34px;height:34px;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);border-radius:8px;transition:color .2s;
}
.hamburger svg{width:18px;height:18px;stroke:currentColor;fill:none}
.mob-logo{display:flex;align-items:center;gap:8px;}
.mob-logo-mark{width:24px;height:24px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;}
.mob-logo-name{font-size:15px;font-weight:600}

/* ─── MAIN ────────────────────────────────────────────── */
.main{flex:1;display:flex;overflow:hidden;}

/* ─── CHAT PANEL ──────────────────────────────────────── */
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* drag & drop overlay */
.drop-overlay{
  position:absolute;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:rgba(11,11,18,.82);
  border:2px dashed var(--accent);border-radius:var(--radius);
  pointer-events:none;
  opacity:0;transition:opacity .18s ease;
}
.drop-overlay.active{opacity:1;pointer-events:all}
.drop-overlay-icon{font-size:36px;line-height:1}
.drop-overlay-label{font-size:15px;font-weight:500;color:var(--accent)}
.drop-overlay-sub{font-size:12px;color:var(--text-muted)}
.messages{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:22px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;text-align:center;padding:48px;}
.welcome-orb{width:54px;height:54px;border-radius:18px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:4px;}
.welcome-title{font-size:16px;font-weight:500;color:var(--text)}
.welcome-desc{font-size:13px;color:var(--text-muted);max-width:280px;line-height:1.65}

/* tutor badge */
.tutor-badge{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-radius:10px;
  background:var(--accent-soft);border:1px solid rgba(123,105,245,.2);
  font-size:12px;color:var(--text-muted);margin-bottom:4px;flex-shrink:0;
}
.tutor-badge strong{color:var(--accent);font-weight:600}

/* messages */
.msg{display:flex;flex-direction:column;max-width:76%;animation:msgIn .3s ease forwards}
@keyframes msgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.lumi{align-self:flex-start;align-items:flex-start}
.msg-head{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.msg-avatar{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.msg-name{font-size:11.5px;font-weight:500;color:var(--text-muted)}
.msg-bubble{padding:12px 16px;border-radius:var(--radius);font-size:14px;line-height:1.7;word-wrap:break-word;}
.msg.user .msg-bubble{background:var(--user-bg);color:#fff;border-bottom-right-radius:4px;}
.msg.lumi .msg-bubble{background:var(--lumi-bg);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg-bubble p{margin:0}.msg-bubble p+p{margin-top:9px}
.msg-bubble strong{font-weight:600}.msg-bubble em{color:var(--text-muted)}
.msg-bubble code{font-family:'SF Mono',Monaco,'Courier New',monospace;font-size:12px;background:rgba(255,255,255,.07);padding:1px 5px;border-radius:4px;}

/* typing */
.typing{display:flex;align-items:center;gap:5px;padding:13px 16px;background:var(--lumi-bg);border:1px solid var(--border);border-radius:var(--radius);border-bottom-left-radius:4px;width:fit-content;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:tdot 1.4s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.15s}.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-6px);opacity:1}}

/* input */
.input-area{padding:14px 20px;border-top:1px solid var(--border);background:var(--bg)}
.attach-preview{display:none;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;position:relative;}
.attach-preview.visible{display:flex}
.attach-thumb{width:44px;height:44px;object-fit:cover;border-radius:7px;flex-shrink:0;}
.attach-file-icon{width:44px;height:44px;background:var(--surface-2);border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex-shrink:0;}
.attach-file-icon svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:1.5}
.attach-file-ext{font-size:8px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.attach-info{flex:1;min-width:0}
.attach-name{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.attach-size{font-size:10.5px;color:var(--text-muted);margin-top:2px}
.attach-remove{width:22px;height:22px;background:var(--surface-2);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0;transition:all .15s;font-size:14px;line-height:1;}
.attach-remove:hover{background:rgba(255,80,80,.15);color:#ff7070}
.attach-btn{width:30px;height:30px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-faint);border-radius:8px;transition:color .2s;flex-shrink:0;}
.attach-btn:hover{color:var(--accent)}
.attach-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8}
.input-wrap{display:flex;align-items:flex-end;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:9px 9px 9px 10px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:var(--accent)}
.msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px;line-height:1.5;resize:none;max-height:120px;overflow-y:auto;}
.msg-input::placeholder{color:var(--text-faint)}
.send-btn{width:34px;height:34px;background:var(--accent);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;opacity:.4;}
.send-btn:not(:disabled){opacity:1;box-shadow:0 2px 10px var(--accent-glow)}
.send-btn:not(:disabled):hover{transform:scale(1.06)}.send-btn:not(:disabled):active{transform:scale(.97)}
.send-btn:disabled{cursor:not-allowed}.send-btn svg{width:15px;height:15px;fill:#fff}
/* message image thumbnail */
.msg-img{max-width:260px;max-height:200px;border-radius:10px;display:block;margin-bottom:6px;object-fit:cover;}
.msg-file-chip{display:inline-flex;align-items:center;gap:7px;background:rgba(123,105,245,.1);border:1px solid rgba(123,105,245,.2);border-radius:8px;padding:6px 10px;margin-bottom:6px;font-size:12px;color:var(--accent);}
.msg-file-chip svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}

/* ─── TOAST ───────────────────────────────────────────── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:#1e0e0e;border:1px solid rgba(255,80,80,.22);color:#ff8585;font-size:13px;padding:9px 18px;border-radius:9px;transition:transform .3s cubic-bezier(.175,.885,.32,1.275);z-index:400;max-width:380px;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#0e1e18;border-color:rgba(87,219,176,.25);color:#78e4c4}

/* ─── SETTINGS DRAWER ─────────────────────────────────── */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .25s;z-index:200;}
.settings-overlay.open{opacity:1;pointer-events:all}
.settings-drawer{position:fixed;top:0;right:0;bottom:0;width:300px;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:201;display:flex;flex-direction:column;}
.settings-drawer.open{transform:translateX(0)}
.settings-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.settings-title{font-size:13px;font-weight:600;color:var(--text)}
.settings-close{width:28px;height:28px;background:none;border:none;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;border-radius:6px;transition:background .15s;font-size:18px;line-height:1;}
.settings-close:hover{background:var(--surface-2)}
.settings-body{flex:1;overflow-y:auto;padding:8px 0;}
.settings-section{padding:18px 20px;border-bottom:1px solid var(--border)}.settings-section:last-child{border-bottom:none}
.settings-section-title{font-size:10px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle-label{font-size:13px;color:var(--text)}
.toggle{position:relative;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:background .2s;}
.toggle input:checked + .toggle-track{background:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.25);}
.toggle input:checked ~ .toggle-thumb{transform:translateX(16px)}
.settings-input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:12px;padding:8px 12px;outline:none;transition:border-color .2s;margin-bottom:8px;}
.settings-input:focus{border-color:var(--accent)}
.settings-input::placeholder{color:var(--text-faint)}
.settings-save-btn{width:100%;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .2s;}
.settings-save-btn:hover{opacity:.85}
.settings-hint{font-size:11px;color:var(--text-faint);margin-top:8px;line-height:1.5}
.danger-btn{width:100%;padding:8px;background:none;border:1px solid rgba(255,80,80,.25);color:#ff7070;border-radius:var(--radius-sm);font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s;}
.danger-btn:hover{background:rgba(255,80,80,.08)}

/* ─── MOBILE ──────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:300;transform:translateX(-264px);}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay{display:block}
  .mob-header{display:flex}
  .sb-teacher,.sb-course-hd,.sb-subj-hd,.sb-general,.sb-new,.hist-item{min-height:44px}
  .send-btn{width:44px;height:44px}

.onboarding{position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;transition:opacity .5s ease;}

.ob-logo-mark{width:52px;height:52px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 28px var(--accent-glow);animation:lumiBreathe 3s ease-in-out infinite;}
.ob-logo-name{font-size:22px;font-weight:600;letter-spacing:-.4px}
.ob-logo-school{font-size:12px;color:var(--text-muted)}

.ob-q{font-size:16px;font-weight:500;color:var(--text);line-height:1.5}
.ob-q-sub{font-size:14px;color:var(--text-muted);font-weight:400;display:block;margin-top:4px}
.ob-name-input{width:100%;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s;}
.ob-name-input:focus{border-color:var(--accent)}
.ob-name-input::placeholder{color:var(--text-faint)}
.ob-grades{display:flex;gap:8px}
.ob-grade-btn{flex:1;padding:13px 8px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .18s;min-height:44px;}
.ob-grade-btn:hover{border-color:var(--accent);color:var(--accent)}
.ob-grade-btn.selected{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.ob-cta{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;opacity:.4;min-height:44px;}
.ob-cta:not([disabled]){opacity:1;box-shadow:0 2px 14px var(--accent-glow)}

.empty-sub{font-size:13px;color:var(--text-muted);max-width:260px;line-height:1.65}
.empty-cards{display:flex;gap:12px;margin-top:6px;width:100%;max-width:440px;justify-content:center;}
.empty-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 16px;cursor:pointer;transition:all .18s;text-align:left;min-width:140px;}

    ? firstUserMsg.content
    : (Array.isArray(firstUserMsg?.content)
        ? (firstUserMsg.content.find(p=>p.type==='text')?.text || '')
        : '');
  convs[S.currentId] = {
    id: S.currentId,
    ts: existing.ts || Date.now(),
    title: existing.title || null,
    preview: previewText.slice(0,60) || 'New chat',
    messages: S.messages,
    values: [...S.values],
    goals: [...S.goals],
    interests: [...S.interests],
    exchangeCount: S.exchangeCount,
    tutorCtx: S.tutorCtx,
  };
  // Cap at 50 conversations — remove oldest first
  const keys = Object.keys(convs).sort((a,b) => convs[a].ts - convs[b].ts);
  if (keys.length > 50) keys.slice(0, keys.length - 50).forEach(k => delete convs[k]);
  saveConvs(convs);
  localStorage.setItem('lumi_current', S.currentId);
}

function migrateOldData() {
  if (localStorage.getItem('lumi_convs')) return;
  const old = localStorage.getItem('lumi_data');
  if (!old) return;
  try {
    const data = JSON.parse(old);
    if (!data.messages?.length) return;
    const id = genId();
    const convs = {};
    convs[id] = { id, ts:Date.now(), preview: data.messages.find(m=>m.role==='user')?.content?.slice(0,55)||'Chat', messages:data.messages, values:data.values||[], goals:data.goals||[], interests:data.interests||[], exchangeCount:data.exchangeCount||0, tutorCtx:null };
    saveConvs(convs);
    localStorage.setItem('lumi_current', id);
    localStorage.removeItem('lumi_data');
  } catch {}
}

// ─── LOAD A CONVERSATION ──────────────────────────────────────────────────────
function loadConv(id) {
  const conv = getConvs()[id];
  if (!conv) return;
  S.currentId     = id;
  S.messages      = conv.messages || [];
  S.exchangeCount = conv.exchangeCount || 0;
  S.tutorCtx      = conv.tutorCtx || null;
  S.ready         = true;
  S.busy          = false;

  messagesEl.innerHTML = '';
  S.values.clear(); S.goals.clear(); S.interests.clear();

  S.messages.forEach(m => renderMsg(m.role, m.content, false));
  (conv.values||[]).forEach(v    => S.values.add(v));
  (conv.goals||[]).forEach(g     => S.goals.add(g));
  (conv.interests||[]).forEach(i => S.interests.add(i));

  // Sync SB state with loaded tutor context
  if (S.tutorCtx) {
    SB.mode = 'tutor';
    SB.activeTeacher = { subjectId: S.tutorCtx.subjectId, course: S.tutorCtx.course, teacher: S.tutorCtx.teacher };
    SB.expandedSubject = S.tutorCtx.subjectId;
  } else {
    SB.mode = 'general';
    SB.activeTeacher = null;
  }

  scrollBottom();
  renderSidebar();
}

// ─── NEW CHAT ─────────────────────────────────────────────────────────────────
function newChat() {
  saveCurrentConv();
  S.currentId     = genId();
  S.messages      = [];
  S.exchangeCount = 0;
  S.tutorCtx      = null;
  S.ready         = false;
  S.values.clear(); S.goals.clear(); S.interests.clear();
  SB.mode = 'all';
  SB.activeTeacher = null;

  messagesEl.innerHTML = '';
  showWelcome();

  renderSidebar();
  if (localStorage.getItem('lumi_key')) startLumi();
}

// ─── OPEN TUTOR SESSION ───────────────────────────────────────────────────────
function openTutor(subjectId, course, teacher) {
  saveCurrentConv();

  const subjectName = SUBJECTS.find(s=>s.id===subjectId)?.name || subjectId;

  S.currentId     = genId();
  S.messages      = [];
  S.exchangeCount = 0;
  S.tutorCtx      = { subjectId, subjectName, course, teacher };
  S.ready         = true;
  S.values.clear(); S.goals.clear(); S.interests.clear();
  SB.mode = 'tutor';
  SB.activeTeacher = { subjectId, course, teacher };

  messagesEl.innerHTML = '';

  // Inject greeting (no API call)
  const greeting = `You're now studying ${course} with ${teacher}. What can I help you with?`;
  S.messages.push({ role:'assistant', content: greeting });
  renderMsg('lumi', greeting, true);
  saveCurrentConv();

  renderSidebar();
  scrollBottom();
  msgInput.focus();
}

// ─── OPEN GENERAL CHAT ───────────────────────────────────────────────────────
function openGeneralChat() {
  saveCurrentConv();
  const name = getStudentName();
  S.currentId     = genId();
  S.messages      = [];
  S.exchangeCount = 0;
  S.tutorCtx      = null;
  S.ready         = true;

  SB.mode = 'general';
  SB.activeTeacher = null;

// ─── HISTORY MENU ────────────────────────────────────────────────────────────
let openMenuId = null;
let activeDropdownEl = null;

function closeOpenMenu() {
  if (activeDropdownEl) { activeDropdownEl.remove(); activeDropdownEl = null; }
  if (openMenuId) {
    const btn = document.querySelector(`.hist-menu-btn[data-id="${openMenuId}"]`);
    if (btn) btn.classList.remove('open');
    openMenuId = null;
  }
}

function openHistMenu(convId, menuBtn) {
  if (openMenuId === convId) { closeOpenMenu(); return; }
  closeOpenMenu();
  openMenuId = convId;
  menuBtn.classList.add('open');

  const dd = document.createElement('div');
  dd.className = 'hist-dropdown';
  activeDropdownEl = dd;

  const renameItem = document.createElement('div');
  renameItem.className = 'hist-dd-item';
  renameItem.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Rename`;
  renameItem.addEventListener('click', e => {
    e.stopPropagation();
    closeOpenMenu();
    startRename(convId);
  });

  const deleteItem = document.createElement('div');
  deleteItem.className = 'hist-dd-item danger';
  deleteItem.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg> Delete`;
  deleteItem.addEventListener('click', e => {
    e.stopPropagation();
    closeOpenMenu();
    deleteConv(convId);
  });

  dd.appendChild(renameItem);
  dd.appendChild(deleteItem);

  // Position below the button
  const rect = menuBtn.getBoundingClientRect();
  dd.style.top  = (rect.bottom + 4) + 'px';
  dd.style.right = (window.innerWidth - rect.right) + 'px';
  document.body.appendChild(dd);
}

function startRename(convId) {
  const titleEl = document.querySelector(`.hist-title[data-id="${convId}"]`);
  const itemEl  = titleEl?.closest('.hist-item');
  if (!titleEl || !itemEl) return;
  const convs = getConvs();
  const conv  = convs[convId];
  if (!conv) return;

  titleEl.classList.add('renaming');
  const inp = document.createElement('input');
  inp.className = 'hist-rename-input';
  inp.value = conv.title || conv.preview || '';
  inp.maxLength = 80;
  itemEl.insertBefore(inp, titleEl.nextSibling);
  inp.focus(); inp.select();

  const finish = () => {
    const newTitle = inp.value.trim();
    inp.remove();
    titleEl.classList.remove('renaming');
    if (newTitle) {
      const c2 = getConvs();
      if (c2[convId]) { c2[convId].title = newTitle; saveConvs(c2); renderSidebar(); }
    }
  };
  inp.addEventListener('blur', finish);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); finish(); }
    if (e.key === 'Escape') { inp.value = ''; finish(); }
  });
}

function deleteConv(convId) {
  if (!confirm('Delete this conversation?')) return;
  const convs = getConvs();
  delete convs[convId];
  saveConvs(convs);
  if (S.currentId === convId) {
    S.currentId = genId();
    S.messages = []; S.exchangeCount = 0; S.tutorCtx = null;
    S.ready = false; S.values.clear(); S.goals.clear(); S.interests.clear();
    SB.mode = 'all'; SB.activeTeacher = null;
    messagesEl.innerHTML = '';
    showWelcome();
  }
  renderSidebar();
}

// ─── SIDEBAR RENDERING ───────────────────────────────────────────────────────
function renderSidebar() {
  const query = sbSearch.value.toLowerCase().trim();
  sbNav.innerHTML = '';

  // ── General Chat button ──
  const genRow = document.createElement('div');
  genRow.className = 'sb-general' + (SB.mode==='general' && !S.tutorCtx ? ' active' : '');
  genRow.innerHTML = `<svg viewBox="0 0 24 24" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> General Chat`;
  genRow.addEventListener('click', () => { openGeneralChat(); closeSidebar(); });
  sbNav.appendChild(genRow);

  // ── Recents list ──
  const convs = getConvs();
  const allConvs = Object.values(convs).sort((a,b) => b.ts - a.ts);
  const filtered = query
    ? allConvs.filter(c => (c.title||c.preview||'').toLowerCase().includes(query))
    : allConvs;

  if (filtered.length > 0) {
    const recLabel = document.createElement('div');
    recLabel.className = 'sb-section-label';
    recLabel.textContent = query ? 'Matching chats' : 'Recents';
    sbNav.appendChild(recLabel);

    filtered.forEach(conv => {
      const displayTitle = conv.title || conv.preview || 'Untitled';
      const isActive = conv.id === S.currentId;

      const item = document.createElement('div');
      item.className = 'hist-item' + (isActive ? ' active' : '');

      const titleSpan = document.createElement('span');
      titleSpan.className = 'hist-title';
      titleSpan.dataset.id = conv.id;
      titleSpan.textContent = displayTitle;

      const menuBtn = document.createElement('button');
      menuBtn.className = 'hist-menu-btn';
      menuBtn.dataset.id = conv.id;
      menuBtn.title = 'Options';
      menuBtn.textContent = '···';

      item.appendChild(titleSpan);
      item.appendChild(menuBtn);

      item.addEventListener('click', e => {
        if (e.target === menuBtn || menuBtn.contains(e.target)) return;
        closeOpenMenu();
        saveCurrentConv();
        SB.activeTeacher = conv.tutorCtx
          ? { subjectId:conv.tutorCtx.subjectId, course:conv.tutorCtx.course, teacher:conv.tutorCtx.teacher }
          : null;
        SB.mode = conv.tutorCtx ? 'tutor' : 'general';
        loadConv(conv.id);
        closeSidebar();
      });

      menuBtn.addEventListener('click', e => {
        e.stopPropagation();
        openHistMenu(conv.id, menuBtn);
      });

      sbNav.appendChild(item);
    });
  } else if (!query) {
    const empty = document.createElement('div');
    empty.className = 'sb-empty';
    empty.textContent = 'No conversations yet';
    sbNav.appendChild(empty);
  }

  // ── Divider + Subjects label ──
  if (!query) {
    const div = document.createElement('div');
    div.className = 'sb-divider';
    sbNav.appendChild(div);
  }
  const lbl = document.createElement('div');
  lbl.className = 'sb-section-label';
  lbl.textContent = 'Subjects';
  sbNav.appendChild(lbl);

  // ── Subject tree ──
  SUBJECTS.forEach(subject => {
    // Filter courses by query
    const matchedCourses = query
      ? subject.courses.filter(c => c.toLowerCase().includes(query) || subject.name.toLowerCase().includes(query))
      : subject.courses;

    if (query && matchedCourses.length === 0 && !subject.name.toLowerCase().includes(query)) return;

    const isOpen = SB.expandedSubject === subject.id || (query && matchedCourses.length > 0);
    const coursesToShow = query ? matchedCourses : subject.courses;

    const subjectEl = document.createElement('div');
    subjectEl.className = 'sb-subject' + (isOpen ? ' open' : '');

    const hd = document.createElement('div');
    hd.className = 'sb-subj-hd';
    hd.innerHTML = `<span style="flex:1">${escHtml(subject.name)}</span>
      <svg class="sb-subj-arrow" viewBox="0 0 24 24" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
    hd.addEventListener('click', () => {
      SB.expandedSubject = SB.expandedSubject === subject.id ? null : subject.id;
      SB.expandedCourse  = null;
      renderSidebar();
    });
    subjectEl.appendChild(hd);

    // Courses
    const coursesEl = document.createElement('div');
    coursesEl.className = 'sb-courses';

    coursesToShow.forEach(course => {
      const isCourseOpen = SB.expandedCourse === `${subject.id}::${course}` || (query && course.toLowerCase().includes(query));
      const courseEl = document.createElement('div');
      courseEl.className = 'sb-course' + (isCourseOpen ? ' open' : '');

      const chd = document.createElement('div');
      chd.className = 'sb-course-hd';
      chd.innerHTML = `<span style="flex:1">${escHtml(course)}</span>
        <svg class="sb-course-arrow" viewBox="0 0 24 24" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
      chd.addEventListener('click', () => {
        const key = `${subject.id}::${course}`;
        SB.expandedCourse = SB.expandedCourse === key ? null : key;
        renderSidebar();
      });
      courseEl.appendChild(chd);

      // Teachers
      const teachersEl = document.createElement('div');
      teachersEl.className = 'sb-teachers';
      getTeachers(subject.name, course).forEach(teacher => {
        const isActive = SB.activeTeacher &&
          SB.activeTeacher.subjectId === subject.id &&
          SB.activeTeacher.course === course &&
          SB.activeTeacher.teacher === teacher;
        const btn = document.createElement('button');
        btn.className = 'sb-teacher' + (isActive ? ' active' : '');
        btn.innerHTML = `<span class="sb-teacher-dot"></span>${escHtml(teacher)}`;
        btn.addEventListener('click', () => {
          openTutor(subject.id, course, teacher);
          closeSidebar();
        });
        teachersEl.appendChild(btn);
      });
      courseEl.appendChild(teachersEl);
      coursesEl.appendChild(courseEl);
    });

    subjectEl.appendChild(coursesEl);
    sbNav.appendChild(subjectEl);
  });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  const d=Date.now()-ts, m=Math.floor(d/60000), h=Math.floor(d/3600000), days=Math.floor(d/86400000);
  if(m<1)return'just now'; if(m<60)return`${m}m ago`; if(h<24)return`${h}h ago`;
  if(days<7)return`${days}d ago`; return new Date(ts).toLocaleDateString();
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showWelcome() {
  if (document.getElementById('welcome')) return;
  messagesEl.innerHTML = '';
  const name = getStudentName();
  const greeting = name !== 'there' ? `Welcome back, ${escHtml(name)}!` : `Hi, I'm Lumi!`;
  const w = document.createElement('div');
  w.className = 'empty-state'; w.id = 'welcome';
  w.innerHTML = `
    <div class="empty-orb">✦</div>
    <div class="empty-greeting">${greeting}</div>
    <div class="empty-sub">Pick up where you left off, or start something new.</div>
    <div class="empty-cards">
      <div class="empty-card" id="emptyGenBtn">
        <div class="empty-card-icon">💬</div>
        <div class="empty-card-title">General Chat</div>
        <div class="empty-card-sub">Just talk to Lumi about anything</div>
      </div>
      <div class="empty-card" id="emptyStudyBtn">
        <div class="empty-card-icon">📚</div>
        <div class="empty-card-title">Study with a Teacher</div>
        <div class="empty-card-sub">Pick a subject from the sidebar</div>
      </div>
    </div>`;
  messagesEl.appendChild(w);
  w.querySelector('#emptyGenBtn').addEventListener('click', openGeneralChat);
  w.querySelector('#emptyStudyBtn').addEventListener('click', () => {
    if (window.innerWidth <= 768) openSidebar();
    else {
      // Expand subjects section visually
      SB.expandedSubject = null;
      renderSidebar();
    }
  });
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
function initOnboarding(onDone) {
  const ob      = $('onboarding');
  const step1   = $('obStep1');
  const step2   = $('obStep2');
  const nameIn  = $('obNameInput');
  const nameBtn = $('obNameNext');
  const gradeQ  = $('obGradeQ');
  const gradeBtn= $('obGradeNext');
  let chosenGrade = null;

  // Enable continue when name has text
  nameIn.addEventListener('input', () => {
    nameBtn.disabled = !nameIn.value.trim();
  });
  nameIn.addEventListener('keydown', e => {
    if (e.key === 'Enter' && nameIn.value.trim()) goToStep2();
  });
  nameBtn.addEventListener('click', goToStep2);

  function goToStep2() {
    const name = nameIn.value.trim();
    if (!name) return;
    gradeQ.innerHTML = `Nice to meet you, ${escHtml(name)}!<span class="ob-q-sub">What grade are you in?</span>`;
    step1.classList.remove('active');
    step2.classList.add('active');
  }

  // Grade selection
  step2.querySelectorAll('.ob-grade-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      step2.querySelectorAll('.ob-grade-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      chosenGrade = btn.dataset.grade;
      gradeBtn.disabled = false;
    });
  });

  gradeBtn.addEventListener('click', () => {
    if (!chosenGrade) return;
    const name = nameIn.value.trim();
    localStorage.setItem('lumi_name', name);
    localStorage.setItem('lumi_grade', chosenGrade);
    ob.classList.add('hidden');
    setTimeout(() => { ob.style.display='none'; onDone(); }, 500);
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  // Theme
  if (localStorage.getItem('lumi_theme')==='light') {
    document.documentElement.classList.add('light');
    themeToggle.checked = true;
  }

  // API key
  const savedKey = localStorage.getItem('lumi_key');
  if (savedKey) keyInput.value = savedKey;

  // Check onboarding
  const onboarded = localStorage.getItem('lumi_name');
  if (!onboarded) {
    initOnboarding(() => { wireListeners(savedKey); startApp(savedKey); });
    return;
  }
  $('onboarding').style.display = 'none';
  startApp(savedKey);
  wireListeners(savedKey);
}

function wireListeners(savedKey) {
  // New Chat
  $('newChatBtn').addEventListener('click', () => {
    if (S.messages.length > 0) {
      if (confirm('Start a new chat? Your current conversation will be saved.')) newChat();
    } else newChat();
  });

  // Close history menu when clicking outside
  document.addEventListener('click', e => {
    if (activeDropdownEl && !activeDropdownEl.contains(e.target)) closeOpenMenu();
  });

  // Search
  sbSearch.addEventListener('input', renderSidebar);

  // Mobile
  $('hamburger').addEventListener('click', openSidebar);
  $('sbOverlay').addEventListener('click', closeSidebar);

  // Settings
  $('gearBtn').addEventListener('click', openSettings);
  $('settingsClose').addEventListener('click', closeSettings);
  $('settingsOverlay').addEventListener('click', closeSettings);

  themeToggle.addEventListener('change', () => {
    const light = themeToggle.checked;
    document.documentElement.classList.toggle('light', light);
    localStorage.setItem('lumi_theme', light ? 'light' : 'dark');
  });

  $('saveKeyBtn').addEventListener('click', () => {
    const key = keyInput.value.trim();
    if (key) {
      localStorage.setItem('lumi_key', key);
      showToast('API key saved.', 'ok');
      closeSettings();
      if (!S.ready) startLumi();
    } else showToast('Please enter an API key.');
  });

  $('clearMemBtn').addEventListener('click', () => {
    if (confirm("Are you sure? This will erase all conversations and memory.")) {
      localStorage.removeItem('lumi_convs');
      localStorage.removeItem('lumi_current');
      localStorage.removeItem('lumi_name');
      localStorage.removeItem('lumi_grade');
      SB.mode='all'; SB.activeTeacher=null; SB.expandedSubject=null; SB.expandedCourse=null;
      closeSettings();
      location.reload();
    }
  });

  // File attachment
  $('attachBtn').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => handleFileSelect(fileInput.files[0]));

  // Drag & drop
  const chatPanel = $('chatPanel');
  const dropOverlay = $('dropOverlay');
  let dragCounter = 0;

  chatPanel.addEventListener('dragenter', e => {
    e.preventDefault();
    dragCounter++;
    dropOverlay.classList.add('active');
  });
  chatPanel.addEventListener('dragleave', e => {
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); }
  });
  chatPanel.addEventListener('dragover', e => { e.preventDefault(); });
  chatPanel.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.classList.remove('active');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const ok = file.type.startsWith('image/') || file.type === 'application/pdf' || file.type === 'text/plain' || file.name.endsWith('.txt');
    if (!ok) { showToast('Only images, PDFs, and text files are supported.'); return; }
    handleFileSelect(file);
  });

  // Chat input
  msgInput.addEventListener('input', () => { autoGrow(msgInput); updateSendBtn(); });
  msgInput.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) doSend(); }
  });
  sendBtn.addEventListener('click', doSend);
}

function startApp(savedKey) {
  migrateOldData();
  // Always start fresh on page load — previous convs accessible in sidebar
  S.currentId = genId();
  renderSidebar();
  showWelcome();
}

function openSidebar()   { $('sidebar').classList.add('open');    $('sbOverlay').classList.add('open'); }
function closeSidebar()  { $('sidebar').classList.remove('open'); $('sbOverlay').classList.remove('open'); }
function openSettings()  { $('settingsDrawer').classList.add('open'); $('settingsOverlay').classList.add('open'); }
function closeSettings() { $('settingsDrawer').classList.remove('open'); $('settingsOverlay').classList.remove('open'); }

function updateSendBtn() {
  sendBtn.disabled = !localStorage.getItem('lumi_key') || (!msgInput.value.trim() && !pendingAttachment) || S.busy;
}
function autoGrow(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

// ─── START LUMI (companion greeting) ────────────────────────────────────────
async function startLumi() {
  if (S.ready) return;
  S.ready = true;
  const w = document.getElementById('welcome');
  if (w) w.remove();
  if (S.messages.length === 0) await fetchLumi();
}

// ─── ATTACHMENT HANDLING ─────────────────────────────────────────────────────
function fmtBytes(b) {
  if (b < 1024) return b+'B';
  if (b < 1048576) return (b/1024).toFixed(1)+'KB';
  return (b/1048576).toFixed(1)+'MB';
}

function clearAttachment() {
  pendingAttachment = null;
  fileInput.value = '';
  attachPreview.innerHTML = '';
  attachPreview.classList.remove('visible');
  updateSendBtn();
}

function showAttachPreview(file, base64, mediaType, isImage) {
  attachPreview.innerHTML = '';
  if (isImage) {
    const img = document.createElement('img');
    img.className = 'attach-thumb';
    img.src = `data:${mediaType};base64,${base64}`;
    attachPreview.appendChild(img);
  } else {
    const ext = file.name.split('.').pop().toUpperCase().slice(0,4);
    const icon = document.createElement('div');
    icon.className = 'attach-file-icon';
    icon.innerHTML = `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="attach-file-ext">${ext}</span>`;
    attachPreview.appendChild(icon);
  }
  const info = document.createElement('div');
  info.className = 'attach-info';
  info.innerHTML = `<div class="attach-name">${escHtml(file.name)}</div><div class="attach-size">${fmtBytes(file.size)}</div>`;
  const removeBtn = document.createElement('button');
  removeBtn.className = 'attach-remove';
  removeBtn.title = 'Remove';
  removeBtn.textContent = '×';
  removeBtn.addEventListener('click', clearAttachment);
  attachPreview.appendChild(info);
  attachPreview.appendChild(removeBtn);
  attachPreview.classList.add('visible');
}

function handleFileSelect(file) {
  if (!file) return;
  const maxMB = file.type === 'application/pdf' ? 32 : 5;
  if (file.size > maxMB * 1024 * 1024) {
    showToast(`File too large. Max ${maxMB}MB.`); return;
  }
  const isImage = file.type.startsWith('image/');
  const isText = file.type === 'text/plain' || file.name.endsWith('.txt');
  if (!isImage && file.type !== 'application/pdf' && !isText) {
    showToast('Unsupported file type.'); return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    // e.target.result is a data URL; strip the prefix to get raw base64
    const dataUrl = e.target.result;
    const base64 = dataUrl.split(',')[1];
    const mediaType = file.type || 'text/plain';
    pendingAttachment = { file, base64, mediaType, isImage, isText };
    showAttachPreview(file, base64, mediaType, isImage);
    updateSendBtn();
  };
  reader.readAsDataURL(file);
}

// ─── SEND ────────────────────────────────────────────────────────────────────
async function doSend() {
  const text = msgInput.value.trim();
  if (!text && !pendingAttachment) return;
  if (S.busy) return;
  if (!localStorage.getItem('lumi_key')) { showToast('Add your API key in Settings.'); openSettings(); return; }

  if (!S.ready) {
    S.ready = true;
    const w = document.getElementById('welcome'); if (w) w.remove();
  }

  // Build content array for this user message
  const att = pendingAttachment;
  let contentParts = [];
  if (att) {
    if (att.isImage) {
      contentParts.push({ type:'image', source:{ type:'base64', media_type:att.mediaType, data:att.base64 } });
    } else if (att.isText) {
      // Decode base64 text and send as text block
      const decoded = atob(att.base64);
      contentParts.push({ type:'text', text:`[Attached file: ${att.file.name}]\n${decoded}` });
    } else {
      // PDF
      contentParts.push({ type:'document', source:{ type:'base64', media_type:'application/pdf', data:att.base64 } });
    }
  }
  if (text) contentParts.push({ type:'text', text });

  const msgContent = contentParts.length === 1 && contentParts[0].type === 'text'
    ? contentParts[0].text   // plain text — store as string for simplicity
    : contentParts;          // multi-part — store array

  msgInput.value = ''; msgInput.style.height = 'auto';
  const sentAtt = att;
  clearAttachment();
  updateSendBtn();

  S.messages.push({ role:'user', content: msgContent });
  saveCurrentConv();
  renderMsg('user', text, true, sentAtt);
  renderSidebar();
  await fetchLumi();
}

// ─── GENERATE TITLE ──────────────────────────────────────────────────────────
async function generateTitle(convId, firstUserMsg) {
  const apiKey = localStorage.getItem('lumi_key');
  if (!apiKey || !firstUserMsg) return;
  // Only generate if the conv doesn't already have a real title
  const convs = getConvs();
  if (!convs[convId] || convs[convId].title) return;
  try {
    const prompt = `Generate a short 4-6 word title for this conversation. Just the title, nothing else, no punctuation at the end: ${firstUserMsg.slice(0, 300)}`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 20,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    if (!res.ok) return;
    const data = await res.json();
    const title = data.content?.[0]?.text?.trim().replace(/[.!?]$/, '');
    if (title) {
      const c2 = getConvs();
      if (c2[convId]) { c2[convId].title = title; saveConvs(c2); renderSidebar(); }
    }
  } catch { /* title generation is non-critical */ }
}

// ─── FETCH LUMI RESPONSE ─────────────────────────────────────────────────────
async function fetchLumi() {
  S.busy = true; updateSendBtn();
  const typing = makeTyping();
  messagesEl.appendChild(typing);
  scrollBottom();

  try {
    const system = S.tutorCtx
      ? buildTutorSystem(S.tutorCtx.subjectName, S.tutorCtx.course, S.tutorCtx.teacher)
      : buildCompanionSystem();
    const { clean, data } = await callAPI(localStorage.getItem('lumi_key'), S.messages, system);
    typing.remove();
    S.messages.push({ role:'assistant', content:clean });
    S.exchangeCount++;
    saveCurrentConv();
    renderMsg('lumi', clean, true);
    renderSidebar();
    if (data) applyProfile(data);
    // After first real exchange, generate a title in the background
    if (S.exchangeCount === 1) {
      const firstUser = S.messages.find(m => m.role === 'user');
      const msgText = typeof firstUser?.content === 'string'
        ? firstUser.content
        : (Array.isArray(firstUser?.content)
            ? (firstUser.content.find(p=>p.type==='text')?.text || '')
            : '');
      if (msgText) generateTitle(S.currentId, msgText);
    }
  } catch (err) {
    typing.remove();
    showToast(err.message || 'Something went wrong. Check your API key.');
    console.error(err);
  } finally {
    S.busy = false; updateSendBtn();
  }
}

// ─── API CALL ────────────────────────────────────────────────────────────────
async function callAPI(apiKey, msgs, system) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1024,
      stream:true,
      system,
      messages:msgs,
    }),
  });

  if (!res.ok) {
    let msg = `API error ${res.status}`;
    try { const e=await res.json(); msg=e.error?.message||msg; } catch {}
    throw new Error(msg);
  }

  const reader=res.body.getReader(), dec=new TextDecoder();
  let buf='', full='';
  while (true) {
    const {done,value}=await reader.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    let nl;
    while((nl=buf.indexOf('\n'))!==-1){
      const line=buf.slice(0,nl).trim(); buf=buf.slice(nl+1);
      if(!line.startsWith('data: '))continue;
      const raw=line.slice(6); if(raw==='[DONE]')continue;
      try{const ev=JSON.parse(raw); if(ev.type==='content_block_delta'&&ev.delta?.type==='text_delta')full+=ev.delta.text;}catch{}
    }
  }
  return parseResponse(full);
}

// ─── PARSE ───────────────────────────────────────────────────────────────────
function parseResponse(text) {
  const lb = text.lastIndexOf('\n{');
  if (lb!==-1) {
    const cand = text.slice(lb+1).trim();
    try {
      const p=JSON.parse(cand);
      if ('values' in p && 'goals' in p && 'interests' in p)
        return { clean:text.slice(0,lb).trim(), data:p };
    } catch {}
  }
  const m = text.match(/\n?\{"values"\s*:[\s\S]*?\}(?:\s*)$/);
  if (m) { try { return { clean:text.slice(0,text.length-m[0].length).trim(), data:JSON.parse(m[0].trim()) }; } catch {} }
  return { clean:text.trim(), data:null };
}

// ─── PROFILE ─────────────────────────────────────────────────────────────────
function applyProfile({ values=[], goals=[], interests=[] }) {
  let anyNew=false;
  const add=(arr,set)=>{
    arr.forEach(raw=>{
      if(!raw)return; const k=raw.toLowerCase().trim();
      if(!set.has(k)){ set.add(k); anyNew=true; }
    });
  };
  add(values,S.values);
  add(goals,S.goals);
  add(interests,S.interests);
  if(anyNew)saveCurrentConv();
}

// ─── RENDER MESSAGE ──────────────────────────────────────────────────────────
function renderMsg(role, content, animate, att) {
  const el=document.createElement('div');
  el.className=`msg ${role}`;
  if(!animate) el.style.animation='none';

  if(role==='lumi'){
    const hd=document.createElement('div'); hd.className='msg-head';
    const av=document.createElement('div'); av.className='msg-avatar'; av.textContent='✦';
    const nm=document.createElement('span'); nm.className='msg-name';
    nm.textContent = S.tutorCtx ? S.tutorCtx.teacher : 'Lumi';
    hd.append(av,nm); el.appendChild(hd);
  }

  const bubble=document.createElement('div'); bubble.className='msg-bubble';

  // content may be a string or a content-parts array (when file was attached)
  if(Array.isArray(content)) {
    content.forEach(part => {
      if(part.type==='image' && part.source?.data) {
        const img=document.createElement('img');
        img.className='msg-img';
        img.src=`data:${part.source.media_type};base64,${part.source.data}`;
        bubble.appendChild(img);
      } else if(part.type==='document') {
        const chip=document.createElement('div');
        chip.className='msg-file-chip';
        chip.innerHTML=`<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF document`;
        bubble.appendChild(chip);
      } else if(part.type==='text' && part.text) {
        const textNode=document.createElement('div');
        textNode.innerHTML=fmtText(part.text);
        bubble.appendChild(textNode);
      }
    });
  } else {
    // Plain send with optional live attachment preview
    if(att) {
      if(att.isImage) {
        const img=document.createElement('img');
        img.className='msg-img';
        img.src=`data:${att.mediaType};base64,${att.base64}`;
        bubble.appendChild(img);
      } else {
        const chip=document.createElement('div');
        chip.className='msg-file-chip';
        chip.innerHTML=`<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${escHtml(att.file.name)}`;
        bubble.appendChild(chip);
      }
    }
    if(content) {
      const textNode=document.createElement('div');
      textNode.innerHTML=fmtText(content);
      bubble.appendChild(textNode);
    }
  }

  el.appendChild(bubble);
  messagesEl.appendChild(el);
  if(animate)scrollBottom();
}

function fmtText(text) {
  if(!text)return'';
  let s=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>');
  const ps=s.split(/\n\n+/);
  if(ps.length>1)return ps.map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
  return`<p>${s.replace(/\n/g,'<br>')}</p>`;
}

function makeTyping() {
  const wrap=document.createElement('div'); wrap.className='msg lumi';
  const hd=document.createElement('div'); hd.className='msg-head';
  const av=document.createElement('div'); av.className='msg-avatar'; av.textContent='✦';
  const nm=document.createElement('span'); nm.className='msg-name';
  nm.textContent = S.tutorCtx ? S.tutorCtx.teacher : 'Lumi';
  hd.append(av,nm);
  const ind=document.createElement('div'); ind.className='typing';
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='typing-dot';ind.appendChild(d);}
  wrap.append(hd,ind); return wrap;
}

function scrollBottom() { messagesEl.scrollTop=messagesEl.scrollHeight; }

let toastTimer;
function showToast(msg,type) {
  toast.textContent=msg;
  toast.className='toast'+(type==='ok'?' ok':'');
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),4000);
}

// ─── GO ──────────────────────────────────────────────────────────────────────
init();
</script>
